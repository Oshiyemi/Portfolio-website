<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="500" viewBox="0 0 1400 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KOD logo with tagline">
  <!-- Transparent background. Uses currentColor so you can recolor via CSS -->
  <g fill="currentColor">
    <!-- K -->
    <rect x="90" y="130" width="44" height="240" rx="18"/>
    <rect x="134" y="252" width="170" height="44" rx="18" transform="rotate(-35 134 252)"/>
    <rect x="134" y="234" width="185" height="44" rx="18" transform="rotate(35 134 234)"/>

    <!-- O -->
    <circle cx="430" cy="250" r="88" fill="none" stroke="currentColor" stroke-width="44"/>

    <!-- D -->
    <rect x="610" y="150" width="44" height="200" rx="18"/>
    <path d="M654 150
             C750 150 820 202 820 250
             C820 298 750 350 654 350"
          fill="none" stroke="currentColor" stroke-width="44" stroke-linecap="round"/>
  </g>

  <!-- Wordmark spacing / optical alignment: the D curve is open like the original style -->
  <!-- Tagline -->
  <text x="90" y="440"
        fill="currentColor"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
        font-size="46"
        font-weight="500"
        letter-spacing="0.5">
    Build fast. Ship clean.
  </text>
</svg>
